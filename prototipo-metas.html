<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ezBookkeeping - Metas Financeiras</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0;
            height: 100vh; /* Faz o fundo ocupar 100% da altura da tela */
            display: flex; /* Ativa o modo de organização flexível */
            justify-content: center; /* Centraliza na horizontal */
            align-items: center; /* Centraliza na vertical */
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            width: 100%;
            max-width: 400px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { margin-top: 0; color: #333; text-align: center; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #d4a373; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #b5835a; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Nova Meta (MVP)</h2>
        <label>Nome da Meta:</label>
        <input type="text" placeholder="Ex: Viagem ENEJ" id="nome">
        <label>Valor Alvo (R$):</label>
        <input type="number" placeholder="Ex: 800.00" id="valor">
        <button onclick="alert('Meta salva com sucesso! (Simulação do PR)')">Salvar Meta</button>
    </div>
</body>
</html>
