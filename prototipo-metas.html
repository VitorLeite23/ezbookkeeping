<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ezBookkeeping - Metas Financeiras</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button.principal {
            width: 100%;
            padding: 12px;
            background-color: #d4a373;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            transition: 0.3s;
        }

        button.principal:hover {
            background-color: #b5835a;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 25px 0 15px 0;
        }

        h3 {
            color: #444;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .meta-item {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-nome {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }

        .meta-valor {
            color: #2a9d8f;
            font-weight: bold;
        }

        .btn-remover {
            background-color: #e76f51;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-remover:hover {
            background-color: #c44536;
        }

        .lista-vazia {
            color: #888;
            text-align: center;
            font-size: 13px;
            font-style: italic;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Criar Nova Meta (MVP)</h2>

    <label>Nome da Meta:</label>
    <input type="text" id="nome" placeholder="Ex: Viagem ENEJ">

    <label>Valor Alvo (R$):</label>
    <input type="number" id="valor" placeholder="Ex: 800">

    <button class="principal" onclick="salvarMeta()">
        Salvar Meta
    </button>

    <hr>

    <h3>Minhas Metas</h3>

    <div id="lista-metas"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", carregarMetas);

function salvarMeta(){

    const nomeInput = document.getElementById("nome");
    const valorInput = document.getElementById("valor");

    const nome = nomeInput.value.trim();
    const valor = parseFloat(valorInput.value);

    if(nome === ""){
        alert("Informe o nome da meta.");
        return;
    }

    if(isNaN(valor) || valor <= 0){
        alert("O valor da meta deve ser maior que zero.");
        return;
    }

    const meta = {
        id: Date.now(),
        nome: nome,
        valor: valor.toFixed(2)
    };

    let metas = JSON.parse(localStorage.getItem("metas")) || [];

    metas.push(meta);

    localStorage.setItem("metas", JSON.stringify(metas));

    nomeInput.value = "";
    valorInput.value = "";

    carregarMetas();

    alert("Meta cadastrada com sucesso!");
}

function carregarMetas(){

    const lista = document.getElementById("lista-metas");

    lista.innerHTML = "";

    const metas = JSON.parse(localStorage.getItem("metas")) || [];

    if(metas.length === 0){

        lista.innerHTML =
        '<p class="lista-vazia">Nenhuma meta cadastrada ainda.</p>';

        return;
    }

    metas.forEach(function(meta){

        const div = document.createElement("div");

        div.className = "meta-item";

        div.innerHTML = `
            <div>
                <div class="meta-nome">${meta.nome}</div>
                <div class="meta-valor">R$ ${meta.valor}</div>
            </div>

            <button class="btn-remover"
            onclick="removerMeta(${meta.id})">
                Excluir
            </button>
        `;

        lista.appendChild(div);

    });

}

function removerMeta(id){

    const confirmar = confirm("Deseja realmente excluir esta meta?");

    if(!confirmar){
        return;
    }

    let metas = JSON.parse(localStorage.getItem("metas")) || [];

    metas = metas.filter(function(meta){
        return meta.id !== id;
    });

    localStorage.setItem("metas", JSON.stringify(metas));

    carregarMetas();

    alert("Meta excluída com sucesso!");

}

</script>

</body>
</html>
